# dnsmasq configuration for Portal Captive Portal
#
# Resolves ALL domain names to the Mac's hotspot bridge IP.
# This ensures the Portal's connectivity check (connectivitycheck.gstatic.com)
# reaches our local server instead of Google.
#
# Usage: sudo dnsmasq -C dnsmasq.conf --no-daemon
#
# The bridge100 interface is created by macOS Internet Sharing.
# Its IP is typically 192.168.2.1 but check with: ifconfig bridge100

# Resolve ALL domains to the hotspot IP
address=/#/192.168.2.1

# Listen only on the bridge interface (hotspot)
listen-address=192.168.2.1
bind-interfaces

# Don't use system resolv.conf — we ARE the resolver
no-resolv

# Don't read /etc/hosts
no-hosts

# Log queries for debugging
log-queries
log-facility=/tmp/dnsmasq-portal.log

# Port (default 53)
port=53
